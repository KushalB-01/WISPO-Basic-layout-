<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wispo - How are you feeling?</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg,#f8fbfc,#eef7f7);
      color:#0f172a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      opacity:0;
      overflow:hidden;
      transition: opacity 0.5s ease;
    }

    body.fade-in { opacity:1; }

    /* animated blobs */
    .blob {
      position:absolute;
      border-radius:50%;
      filter: blur(80px);
      opacity:0.4;
      animation: move 12s infinite alternate ease-in-out;
    }

    .blob1 { width:300px; height:300px; background:#22d3ee; top:10%; left:10%; }
    .blob2 { width:250px; height:250px; background:#14b8a6; bottom:10%; right:10%; }

    @keyframes move {
      0% { transform: translate(0,0); }
      100% { transform: translate(40px,-40px); }
    }

    h1 {
      font-size:34px;
      margin-bottom:10px;
    }

    p {
      color:#64748b;
      margin-bottom:35px;
    }

    .container {
      text-align:center;
      animation: fadeUp 0.8s ease;
      position:relative;
      z-index:2;
    }
   .emotions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.emotions .card:nth-last-child(2) {
  grid-column: 2;
}

.emotions .card:nth-last-child(1) {
  grid-column: 3;
}
    

    .card {
      background:white;
      padding:18px;
      border-radius:18px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 6px 18px rgba(0,0,0,0.05);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.05);
      background: linear-gradient(135deg,#14b8a6,#22d3ee);
      color:white;
    }

    .card.selected {
      background: linear-gradient(135deg,#14b8a6,#22d3ee);
      color:white;
      box-shadow: 0 10px 25px rgba(20,184,166,0.3);
    }

    .emoji {
      font-size:26px;
      margin-bottom:6px;
    }

    .skip {
      margin-top:25px;
      color:#14b8a6;
      cursor:pointer;
      font-size:14px;
    }

    /* subtle breathing animation */
    body::after {
      content:"";
      position:absolute;
      width:100%; height:100%;
      background: radial-gradient(circle, rgba(20,184,166,0.08), transparent 70%);
      animation: breathe 6s infinite ease-in-out;
      z-index:1;
    }

    @keyframes breathe {
      0%,100% { opacity:0.4; transform: scale(1); }
      50% { opacity:0.7; transform: scale(1.05); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(30px);} 
      to { opacity:1; transform: translateY(0);} 
    }

    @media(max-width:600px){
  .emotions {
    grid-template-columns: repeat(2, 1fr);
  }

  .emotions .card:nth-last-child(2),
  .emotions .card:nth-last-child(1){
    grid-column: auto;
  }
}
  </style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">
  <h1>How are you feeling today?</h1>
  <p>You’re safe here. Choose what matches your mood.</p>

  <div class="emotions">
    <div class="card"> <div class="emoji">😔</div> Sad </div>
    <div class="card"> <div class="emoji">😰</div> Anxious </div>
    <div class="card"> <div class="emoji">😡</div> Angry </div>
    <div class="card"> <div class="emoji">😐</div> Numb </div>
    <div class="card"> <div class="emoji">🙂</div> Okay </div>
    <div class="card"> <div class="emoji">😄</div> Happy </div>
    <div class="card"> <div class="emoji">😓</div> Stressed </div>
    <div class="card"> <div class="emoji">😣</div> Overwhelmed </div>
    <div class="card"> <div class="emoji">🥺</div> Lonely </div>
    <div class="card"> <div class="emoji">🤔</div> Don’t Know </div>
  </div>

  <div class="skip">Not sure? You can just start talking →</div>
</div>

<script>
  window.onload = () => document.body.classList.add('fade-in');

  const cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    card.addEventListener('click', () => {
      cards.forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');

      setTimeout(() => {
        document.body.style.opacity = '0';
        setTimeout(() => {
          window.location.href = 'chat.html';
        }, 400);
      }, 500);
    });
  });

  document.querySelector('.skip').addEventListener('click', () => {
    document.body.style.opacity = '0';
    setTimeout(() => {
      window.location.href = 'chat.html';
    }, 400);
  });
</script>

</body>
</html>
